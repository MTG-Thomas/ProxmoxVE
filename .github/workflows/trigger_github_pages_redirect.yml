name: Pages Fork Landing

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create fork landing page
        run: |
          mkdir site
          cat > site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>MTG Proxmox VE Helper-Scripts</title>
            <style>
              :root {
                color-scheme: light dark;
                font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                line-height: 1.55;
              }

              body {
                margin: 0;
                background: #f6f7f9;
                color: #18202a;
              }

              main {
                max-width: 920px;
                margin: 0 auto;
                padding: 72px 24px 56px;
              }

              h1 {
                margin: 0 0 18px;
                font-size: clamp(2rem, 5vw, 4rem);
                line-height: 1.05;
              }

              p {
                max-width: 760px;
                margin: 0 0 18px;
                font-size: 1.08rem;
              }

              .actions {
                display: flex;
                flex-wrap: wrap;
                gap: 12px;
                margin: 32px 0;
              }

              a {
                color: #095b7d;
                font-weight: 650;
              }

              .button {
                display: inline-block;
                border: 1px solid #25313f;
                border-radius: 6px;
                padding: 10px 14px;
                color: #18202a;
                text-decoration: none;
              }

              section {
                margin-top: 40px;
              }

              ul {
                padding-left: 1.2rem;
              }

              li {
                margin: 10px 0;
              }

              @media (prefers-color-scheme: dark) {
                body {
                  background: #101418;
                  color: #edf1f5;
                }

                a {
                  color: #71c7ec;
                }

                .button {
                  border-color: #c4ccd5;
                  color: #edf1f5;
                }
              }
            </style>
          </head>
          <body>
            <main>
              <h1>MTG Proxmox VE Helper-Scripts</h1>
              <p>
                This is a sysadmin-tilted fork of the community Proxmox VE Helper-Scripts project.
                The fork prioritizes reviewable hardening, conservative defaults, and clear security
                exceptions for scripts that operators may run as root on real infrastructure.
              </p>
              <div class="actions">
                <a class="button" href="https://github.com/MTG-Thomas/ProxmoxVE">Repository</a>
                <a class="button" href="https://github.com/MTG-Thomas/ProxmoxVE/blob/main/docs/security/script-security-model.md">Security Model</a>
                <a class="button" href="https://community-scripts.org/">Upstream Catalog</a>
              </div>
              <section>
                <h2>Fork stance</h2>
                <ul>
                  <li>Prefer unprivileged containers unless a script has a documented reason.</li>
                  <li>Pin high-risk downloads or document the remaining supply-chain exception.</li>
                  <li>Avoid broad permissions, live remote execution, unauthenticated Docker sockets, and unsafe cleanup paths.</li>
                  <li>Keep upstream attribution visible while reviewing fork changes on their own merits.</li>
                </ul>
              </section>
            </main>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy
        uses: actions/deploy-pages@v4
